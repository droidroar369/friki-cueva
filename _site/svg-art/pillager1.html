<html>
<head>
<title>Pillager en SVG HTML</title>
<!--Estilos y colores-->
<style>
.elem_negro_trans { fill:black; opacity:0.6; }
.elem_blanco { fill:white; }
.elem_blanco_trans { fill:white; opacity:0.3; }
.elem_gris { fill:#333; } /*gris:50% negro:50%*/
.elem_gris_trans { fill:#333; opacity:0.65; }
.elem_lightgris { fill:#909090; } /*gris:85% blanco:15%*/
.elem_lightgris_trans { fill:#909090; opacity:0.65; }
.elem_cyan_trans { fill:hsl(180,76%,30%); opacity:0.6; } /*cyan:60% negro:40% (convertidos a notacion HSL)*/
</style>
</head>

<body>


<svg width="100" height="200">
<rect x="0" y ="0" width="100" height="200" /> <!--Borde negro-->
<!-- 0.095 = (2/3)*(1/7)-->
<rect x="9.5" y="9.5" width="81" height="181" class="elem_lightgris" /> <!--Fondo gris claro-->
<!--% 0.238 = (1/3)*(5/7)-->

<polygon points="42.1,190.5 57.9,190.5 57.9,123.9 54,123.9 54,127.9 46.1,127.9 46.1,123.9 42.1,123.9" class="elem_gris" /> <!--Nariz-->
<polygon points="38.1,190.5 61.9,190.5 61.9,123.9 54,123.9 54,127.9 46.1,127.9 46.1,123.9 38.1,123.9" class="elem_gris_trans" /> <!--Borde nariz-->

<polygon points="9.5,127.9 38.1,127.9 38.1,123.9 33.7,123.9 33.7,111.9 9.5,111.9" class="elem_blanco" /> <!--Ojo izq.-->
<rect x="9.5" y="123.9" width="23.8" height="8" class="elem_blanco_trans" /> <!--Borde ojo izq.-->
<polygon points="90.5,127.9 61.9,127.9 61.9,123.9 66.7,123.9 66.7,111.9 90.5,111.9" class="elem_blanco" /> <!--Ojo der.-->
<rect x="66.7" y="123.9" width="23.8" height="8" class="elem_blanco_trans" /> <!--Borde ojo der.-->

<polygon points="42.1,127.9 42.1,123.9 38.1,123.9 38.1,119.9 33.7,119.9 33.7,111.9 29.7,111.9 29.7,123.9 33.7,123.9 33.7,127.9" class="elem_cyan_trans"/> <!--Iris izq.-->
<polygon points="57.9,127.9 57.9,123.9 61.9,123.9 61.9,119.9 66.7,119.9 66.7,111.9 70.7,111.9 70.7,123.9 66.7,123.9 66.7,127.9" class="elem_cyan_trans" /> <!-- Iris der.-->

<!--Ceja izq.-->
<polygon points="9.5,111.9 33.3,111.9 33.3,107.9 29.3,107.9 29.3,103.9 25.3,103.9 25.3,99.9 9.5,99.9" />
<!--Ceja der.-->
<polygon points="90.5,111.9 66.7,111.9 66.7,107.9 70.7,107.9 70.7,103.9 74.7,103.9 74.7,99.9 90.5,99.9" />

<!--Marco negro transparente-->
<rect x="0" y="185.7" width="100" height="14.3" class="elem_negro_trans" />
<rect x="85.7" y="14.3" width="14.3" height="171.4" class="elem_negro_trans" />
<rect x="0" y="0" width="100" height="14.3" class="elem_negro_trans" />
<rect x="0" y="14.3" width="14.3" height="171.4" class="elem_negro_trans" />
</svg>


</body>
</html>
