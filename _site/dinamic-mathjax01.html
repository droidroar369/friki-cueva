<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic MathJax</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script>
        function updateEquation() {
            let a = document.getElementById("a-input").value;
            let equation = `e^{-${a}x^2}`;
            document.getElementById("equation").textContent = `\\(${equation}\\)`;
            MathJax.typesetClear();
            MathJax.typeset();
        }
    </script>
</head>


<body>
    <h1>Enter the value for "a":</h1>
    <input type="text" id="a-input" oninput="updateEquation()">
    <p>Equation: <span id="equation"></span></p>
    
    $$\int_{-\infty}^\infty e^{-x^2}\ \mathsf dx= \sqrt\pi$$
</body>
</html>
