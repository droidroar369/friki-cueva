<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG example</title>
    <script></script>
</head>


<body style="background-color:gray;">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><!--!Font Awesome Free 6.7.2 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2025 Fonticons, Inc.-->
    <!--<path d="M 70 5 A 45 45 0 1 0 70 95 M 70 5 A 58 58 0 0 0 70 95" fill="transparent" stroke="white"/>-->
    <circle cx="50"  cy="50" r="25" fill="black"/>
    <g transform="translate(50, 50)">
    <line x1="30" y1="0" x2="45" y2="0" stroke="black"  stroke-width="3"/>
    <line x1="30" y1="0" x2="45" y2="0" transform="rotate(45 0 0)" stroke="black" stroke-width="3"/>
    <line x1="30" y1="0" x2="45" y2="0" transform="rotate(90 0 0)" stroke="black" stroke-width="3"/>
    <line x1="30" y1="0" x2="45" y2="0" transform="rotate(135 0 0)" stroke="black" stroke-width="3"/>
    <line x1="30" y1="0" x2="45" y2="0" transform="rotate(180 0 0)" stroke="black" stroke-width="3"/>
    <line x1="30" y1="0" x2="45" y2="0" transform="rotate(225 0 0)" stroke="black" stroke-width="3"/>
    <line x1="30" y1="0" x2="45" y2="0" transform="rotate(270 0 0)" stroke="black" stroke-width="3"/>
    <line x1="30" y1="0" x2="45" y2="0" transform="rotate(315 0 0)" stroke="black" stroke-width="3"/>
    </g>
    </svg>
</body>
</html>
